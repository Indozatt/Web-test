<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>FixSantai</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #F8FAFC;
      color: #1F2937;
    }
    header {
      padding: 60px 20px;
      text-align: center;
      background: #A8DADC;
    }
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 36px;
    }
    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: #1F2937;
      color: Brown Black;
      border-radius: 8px;
      text-decoration: none;
    }
    section {
      padding: 40px 20px;
      text-align: center;
    }
    .services, .why {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .card {
      background: Dark white ;
      padding: 20px;
      border-radius: 12px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>

<header>
  <h1>Barang Rusak? Santai, Kita Bantu.</h1>
  <p>Dari HP sampai laptop, semua bisa diperbaiki tanpa ribet.</p>
  <a href="#" class="btn">Cek Sekarang</a>
</header>

<section>
  <h2>Layanan Kami</h2>
  <div class="services">
    <div class="card">📱 HP</div>
    <div class="card">💻 Laptop</div>
    <div class="card">📺 TV</div>
    <div class="card">🎮 Gadget</div>
  </div>
</section>

<section>
  <h2>Kenapa Pilih Kami?</h2>
  <div class="why">
    <div class="card">⚡ Cepat</div>
    <div class="card">💸 Terjangkau</div>
    <div class="card">🔧 Profesional</div>
    <div class="card">🤝 Jujur</div>
  </div>
</section>

<section>
  <h2>Hubungi Kami</h2>
  <p>Kirim pesan dan kita bantu sekarang juga.</p>
  <a href="#" class="btn">Chat Sekarang</a>
</sec
